# BuzzCVPilot — primary domain (root path)
# Serves same build as subdomain: /opt/cvbuilder/frontend/dist-subdomain
#
# Install:
#   sudo bash /opt/cvbuilder/deploy/setup-buzzcvpilot.sh
# SSL:
#   sudo CERTBOT_EMAIL=you@example.com bash /opt/cvbuilder/deploy/setup-ssl-buzzcvpilot.sh

server {
    listen 80;
    server_name buzzcvpilot.com www.buzzcvpilot.com;

    client_max_body_size 50M;

    root /opt/cvbuilder/frontend/dist-subdomain;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
