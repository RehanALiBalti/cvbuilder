# BuzzCVPilot — subdomain (root path)
# Serves CV Builder at http://cv.buzzwaretech.com/
#
# Install:
#   sudo cp deploy/nginx-cv-subdomain.conf /etc/nginx/sites-available/cv-buzzware
#   sudo ln -sf /etc/nginx/sites-available/cv-buzzware /etc/nginx/sites-enabled/cv-buzzware
#   sudo nginx -t && sudo systemctl reload nginx
#
# Frontend: separate build for subdomain (does not use frontend/dist/)
# Built with: VITE_BASE_PATH=/ VITE_OUT_DIR=dist-subdomain

server {
    listen 80;
    server_name cv.buzzwaretech.com;

    client_max_body_size 50M;

    root /opt/cvbuilder/frontend/dist-subdomain;
    index index.html;

    # gzip for text assets (safe; ignored if already enabled globally)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    # SEO static files: serve the real files with correct Content-Type,
    # never fall back to the SPA index.html (404 if missing so it's obvious).
    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        default_type application/xml;
        try_files /sitemap.xml =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Content-hashed build assets can be cached aggressively.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: static file first, then app routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
