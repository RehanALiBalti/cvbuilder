# BuzzCVPilot — subdomain (root path)
# Serves CV Builder at http://cv.buzzwaretech.com/
#
# Install:
#   sudo cp deploy/nginx-cv-subdomain.conf /etc/nginx/sites-available/cv-buzzware
#   sudo ln -sf /etc/nginx/sites-available/cv-buzzware /etc/nginx/sites-enabled/cv-buzzware
#   sudo nginx -t && sudo systemctl reload nginx
#
# Frontend: separate build for subdomain (does not use frontend/dist/)
# Built with: VITE_BASE_PATH=/ VITE_OUT_DIR=dist-subdomain

server {
    listen 80;
    server_name cv.buzzwaretech.com;

    client_max_body_size 50M;

    root /opt/cvbuilder/frontend/dist-subdomain;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
